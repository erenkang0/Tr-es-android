name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "İspanyolca Sözlük ${{ github.ref_name }}"
          body: |
            ## İspanyolca–Türkçe Sözlük ${{ github.ref_name }}

            Türkçe konuşan kullanıcılar için tamamen çevrimdışı İspanyolca sözlük.

            ### Özellikler
            - Çift yönlü kelime arama (ES ↔ TR)
            - Favoriler listesi
            - Günün Kelimesi
            - Tamamen offline — internet gerekmez
            - Material Design 3

            ### Kurulum
            APK dosyasını indirip Android cihazınıza yükleyin.
            (Ayarlar → Güvenlik → Bilinmeyen kaynaklara izin ver)
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
